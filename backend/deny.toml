# cargo-deny: Rust advisories + license allowlist + source hygiene.
# Local: `npm run lint:deps:rust` (soft-skips when cargo-deny is absent).
# CI hard gate: .github/workflows/security.yml.
#
# @see docs/specs/500-ci-release/spec.md [FR-17]
# @see docs/specs/500-ci-release/design.md [DES-CI-SUPPLY-CHAIN]

[graph]
features = ["ble"]

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "0BSD",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
