<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>

    <linearGradient id="threadGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" fill="#0f172a" rx="80"/>

  <!-- The flowing thread connecting three nodes -->
  <g transform="translate(256, 256)">
    
    <!-- Main flow path -->
    <path d="M -120 0 
             Q -80 -50, -40 0
             Q 0 50, 40 0
             Q 80 -50, 120 0"
          stroke="url(#flowGrad)"
          stroke-width="12"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.9"/>

    <!-- Golden thread overlay -->
    <path d="M -120 0 
             Q -80 -50, -40 0
             Q 0 50, 40 0
             Q 80 -50, 120 0"
          stroke="url(#threadGrad)"
          stroke-width="4"
          fill="none"
          stroke-linecap="round"/>

    <!-- Three nodes: Spec, Code, Execution -->
    <!-- Spec (left) -->
    <circle cx="-120" cy="0" r="24" fill="url(#flowGrad)"/>
    <circle cx="-120" cy="0" r="18" fill="#0f172a"/>
    <circle cx="-120" cy="0" r="8" fill="url(#threadGrad)"/>

    <!-- Code (center) - slightly larger as the focal point -->
    <circle cx="0" cy="0" r="28" fill="url(#flowGrad)"/>
    <circle cx="0" cy="0" r="22" fill="#0f172a"/>
    <circle cx="0" cy="0" r="10" fill="url(#threadGrad)"/>

    <!-- Execution (right) -->
    <circle cx="120" cy="0" r="24" fill="url(#flowGrad)"/>
    <circle cx="120" cy="0" r="18" fill="#0f172a"/>
    <circle cx="120" cy="0" r="8" fill="url(#threadGrad)"/>

    <!-- Subtle orbit suggesting continuous flow -->
    <ellipse rx="160" ry="80" 
             stroke="url(#flowGrad)" 
             stroke-width="2" 
             fill="none" 
             opacity="0.2"
             stroke-dasharray="6,10"/>

    <!-- Flow direction indicators -->
    <g opacity="0.6">
      <path d="M -40 0 L -48 -5 M -40 0 L -48 5" 
            stroke="url(#threadGrad)" 
            stroke-width="4" 
            stroke-linecap="round"/>
      <path d="M 40 0 L 32 -5 M 40 0 L 32 5" 
            stroke="url(#threadGrad)" 
            stroke-width="4" 
            stroke-linecap="round"/>
    </g>
  </g>

  <!-- Minimal AFX text at bottom -->
  <text x="256" y="440" 
        font-family="'SF Mono', monospace" 
        font-size="48" 
        fill="#e2e8f0" 
        text-anchor="middle" 
        font-weight="700"
        letter-spacing="6">AFX</text>
</svg>
